name: node_exporter_service

services:
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME}_node_exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    ports:
      - "${NODE_EXPORTER_PORT}:9100"
    restart: unless-stopped
    volumes:
      - "/:/host:ro,rslave"
